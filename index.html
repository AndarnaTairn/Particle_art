<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Particle System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="ui-layer">
    <h1>Particle Space</h1>
    <div id="gesture-info">
      <p>Gestures:</p>
      <ul>
        <li><strong>Pinch:</strong> Scale particles</li>
        <li><strong>Open/Close Hand:</strong> Switch Colors</li>
        <li><strong>Swipe L/R:</strong> Cycle Shapes (<span id="current-shape">Heart</span>)</li>
      </ul>
    </div>
    <div id="status">Initializing MediaPipe & Three.js...</div>
  </div>
  
  <div class="video-container">
    <video id="webcam" autoplay playsinline></video>
  </div>
  
  <canvas id="webgl-canvas"></canvas>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  
  <!-- MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js" crossorigin="anonymous"></script>

  <script type="module" src="main.js"></script>
</body>
</html>
